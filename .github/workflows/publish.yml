name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Check whether this version is already published
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "$package_name@$package_version" version 2>/dev/null || true)"
          if [[ "$published_version" == "$package_version" ]]; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already available on npm; skipping publish."
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package to npm
        if: steps.npm-version.outputs.already-published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
